version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8080:80"
    environment:
      - DB_HOST=db
      - DB_NAME=myteamwork
      - DB_USER=myteamwork_user
      - DB_PASS=myteamwork_pass
      - DB_ROOT_PASS=rootpass
      - APP_ENV=development
      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=587
      - SMTP_USER=your-email@gmail.com
      - SMTP_PASS=your-app-password
      - MAIL_FROM=noreply@myteamwork.com
    volumes:
      - ./backend:/var/www/html
      - ./frontend:/var/www/html/public/app-dev
    depends_on:
      - db
    networks:
      - myteamwork-network

  db:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=rootpass
      - MYSQL_DATABASE=myteamwork
      - MYSQL_USER=myteamwork_user
      - MYSQL_PASSWORD=myteamwork_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - myteamwork-network
    command: --default-authentication-plugin=mysql_native_password

volumes:
  mysql_data:

networks:
  myteamwork-network:
    driver: bridge