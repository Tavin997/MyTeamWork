<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar conta - MyTeamWork</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- CSS da View -->
    <link rel="stylesheet" href="../assets/css/register.css">
</head>

<body>
    <!-- ============================================ -->
    <!-- NAVEGAÇÃO SIMPLES -->
    <!-- ============================================ -->
    <nav class="navbar fixed-top" id="mainNav">
        <div class="container">
            <a class="navbar-brand" href="index.php?route=home">
                MyTeamWork
            </a>
            <a href="index.php?route=home" class="btn btn-outline-dark btn-sm">
                <i class="fas fa-arrow-left me-1"></i> Voltar
            </a>
        </div>
    </nav>

    <!-- ============================================ -->
    <!-- REGISTER -->
    <!-- ============================================ -->
    <section class="register-section">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-5 col-md-7">
                    <div class="register-card">
                        <div class="register-header">
                            <h1 class="register-title">Criar sua conta</h1>
                            <p class="register-subtitle">Comece a organizar sua equipe em minutos</p>
                        </div>

                        <!-- Formulário de Cadastro -->
                        <form action="index.php?route=auth/register" method="POST" id="registerForm"
                            class="register-form">
                            <div class="form-group">
                                <label for="registerName" class="form-label">Nome completo</label>
                                <input type="text" class="form-control" id="registerName" name="nome"
                                    placeholder="Seu nome" required autofocus>
                            </div>

                            <div class="form-group">
                                <label for="registerEmail" class="form-label">E-mail</label>
                                <input type="email" class="form-control" id="registerEmail" name="email"
                                    placeholder="seu@email.com" required>
                                <div class="form-hint">Usaremos este e-mail para login e notificações</div>
                            </div>

                            <div class="form-group">
                                <label for="registerPassword" class="form-label">Senha</label>
                                <div class="password-wrapper">
                                    <input type="password" class="form-control" id="registerPassword" name="senha"
                                        placeholder="••••••••" required minlength="6">
                                    <button type="button" class="password-toggle" id="togglePassword"
                                        aria-label="Mostrar senha">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                </div>
                                <div class="form-hint">Mínimo 6 caracteres</div>
                            </div>

                            <div class="form-group">
                                <label for="registerConfirmPassword" class="form-label">Confirmar senha</label>
                                <div class="password-wrapper">
                                    <input type="password" class="form-control" id="registerConfirmPassword"
                                        placeholder="••••••••" required>
                                    <button type="button" class="password-toggle" id="toggleConfirmPassword"
                                        aria-label="Mostrar senha">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                </div>
                            </div>

                            <div class="form-group form-check">
                                <input type="checkbox" class="form-check-input" id="termsCheck" name="terms" required>
                                <label class="form-check-label" for="termsCheck">
                                    Concordo com os
                                    <a href="#" target="_blank">Termos de Serviço</a>
                                    e
                                    <a href="#" target="_blank">Política de Privacidade</a>
                                </label>
                            </div>

                            <button type="submit" class="btn btn-dark btn-register">
                                Criar conta
                            </button>

                            <div class="login-footer">
                                <p class="mb-0">
                                    Já tem uma conta?
                                    <a href="index.php?route=login" class="login-link">Fazer login</a>
                                </p>
                            </div>
                        </form>

                        <!-- Feedback Messages -->
                        <div id="registerFeedback" class="feedback-message"></div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- ============================================ -->
    <!-- SCRIPTS -->
    <!-- ============================================ -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../assets/js/register.js"></script>
</body>

</html>
