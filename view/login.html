    <!-- Font Awesome -->

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- CSS da View -->
    <link rel="stylesheet" href="../assets/css/login.css">
</head>

<body>
    <!-- ============================================ -->
    <!-- NAVEGAÇÃO SIMPLES -->
    <!-- ============================================ -->
    <nav class="navbar fixed-top" id="mainNav">
        <div class="container">
            <a class="navbar-brand" href="index.php?route=home">
                MyTeamWork
            </a>
            <a href="index.php?route=home" class="btn btn-outline-dark btn-sm">
                <i class="fas fa-arrow-left me-1"></i> Voltar
            </a>
        </div>
    </nav>

    <!-- ============================================ -->
    <!-- LOGIN -->
    <!-- ============================================ -->
    <section class="login-section">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-5 col-md-7">
                    <div class="login-card">
                        <div class="login-header">
                            <h1 class="login-title">Bem-vindo de volta</h1>
                            <p class="login-subtitle">Entre com suas credenciais para acessar sua conta</p>
                        </div>

                        <!-- Formulário de Login -->
                        <form id="loginForm" class="login-form" novalidate>
                            <div class="form-group">
                                <label for="loginEmail" class="form-label">E-mail</label>
                                <input type="email" class="form-control" id="loginEmail" name="email"
                                    placeholder="seu@email.com" required autofocus>
                            </div>

                            <div class="form-group">
                                <div class="d-flex justify-content-between align-items-center">
                                    <label for="loginPassword" class="form-label">Senha</label>
                                    <a href="index.php?route=forgot-password" class="forgot-link">Esqueceu a senha?</a>
                                </div>
                                <div class="password-wrapper">
                                    <input type="password" class="form-control" id="loginPassword" name="senha"
                                        placeholder="••••••••" required>
                                    <button type="button" class="password-toggle" id="togglePassword"
                                        aria-label="Mostrar senha">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                </div>
                            </div>

                            <div class="form-group form-check">
                                <input type="checkbox" class="form-check-input" id="rememberMe" name="remember">
                                <label class="form-check-label" for="rememberMe">Lembrar-me</label>
                            </div>

                            <button type="submit" class="btn btn-dark btn-login" id="loginBtn">
                                Entrar
                            </button>

                            <div class="login-divider">
                                <span>ou</span>
                            </div>

                            <div class="login-footer">
                                <p class="mb-0">
                                    Não tem uma conta?
                                    <a href="index.php?route=register" class="register-link">Criar conta</a>
                                </p>
                            </div>
                        </form>

                        <!-- Feedback Messages -->
                        <div id="loginFeedback" class="feedback-message"></div>
                    </div>
                </div>
            </div>
        </div>
    </section>
